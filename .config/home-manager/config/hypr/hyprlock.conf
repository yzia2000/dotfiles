# ─────────────────────────────────────────────────────────────
# Flexoki Dark — "Minimal" lock screen
# Solid, flat, monochrome. One accent: base-500 gray.
# ─────────────────────────────────────────────────────────────

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    color = rgba(16, 15, 15, 1.0)   # Flexoki black #100F0F
    blur_passes = 0
}

# Large clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(206, 205, 195, 1.0)   # base-200
    font_size = 96
    font_family = CommitMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(135, 133, 128, 1.0)   # base-500
    font_size = 18
    font_family = CommitMono Nerd Font
    position = 0, 10
    halign = center
    valign = center
}

# Password input — flat pill, monochrome
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 1
    dots_size = 0.26
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(52, 51, 49, 1.0)     # base-850 border
    inner_color = rgba(28, 27, 26, 1.0)     # base-950 field
    font_color = rgba(206, 205, 195, 1.0)   # base-200
    font_family = CommitMono Nerd Font
    fade_on_empty = false
    placeholder_text = <span foreground="##6F6E69">enter password</span>
    hide_input = false
    rounding = 8
    check_color = rgba(135, 133, 128, 1.0)  # base-500 (verifying)
    fail_color = rgba(175, 48, 41, 1.0)     # flexoki red #AF3029
    fail_text = <span foreground="##AF3029">$FAIL ($ATTEMPTS)</span>
    fail_timeout = 2000
    fail_transition = 300
    capslock_color = rgba(173, 131, 1, 1.0) # flexoki yellow
    position = 0, -120
    halign = center
    valign = center
}

# User
label {
    monitor =
    text =    $USER
    color = rgba(111, 110, 105, 1.0)   # base-600
    font_size = 14
    font_family = CommitMono Nerd Font
    position = 0, -190
    halign = center
    valign = center
}
