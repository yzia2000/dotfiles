# ─────────────────────────────────────────────────────────────
# Flexoki Dark — "Minimal" rice (minimal.guide / kepano)
# Native Wayland, monochrome chrome, no padding.
# ─────────────────────────────────────────────────────────────

# Native Wayland (no XWayland) — sharp at fractional scaling
linux_display_server      wayland

# Remote control so shell wrappers can toggle padding for TUIs (nvim/yazi)
allow_remote_control      yes

# Typography
font_family               CommitMono Nerd Font Mono
font_size                 12.0
disable_ligatures         never

# Minimal — padding for the shell (TUIs drop it to 0 via shell wrappers)
window_padding_width      12
window_margin_width       0
hide_window_decorations   yes
background_opacity        1.0
background_blur           0
confirm_os_window_close   0
scrollback_lines          20000
enable_audio_bell         no
sync_to_monitor           yes

# Monochrome chrome — the single "accent" is base-500 gray
cursor_shape              block
cursor_blink_interval     0
cursor                    #878580
cursor_text_color         #100F0F
url_color                 #878580

foreground                #CECDC3
background                #100F0F
selection_foreground      #CECDC3
selection_background      #282726

# Window / bell borders
active_border_color       #878580
inactive_border_color     #343331
bell_border_color         #AD8301

# Title / tab bar — quiet, minimal
wayland_titlebar_color    system
macos_titlebar_color      system
tab_bar_edge              top
tab_bar_style             separator
tab_bar_min_tabs          2
tab_separator             "  ┃  "
active_tab_foreground     #E6E4D9
active_tab_background     #282726
inactive_tab_foreground   #6F6E69
inactive_tab_background   #1C1B1A
tab_bar_background        #100F0F
active_tab_font_style     normal
inactive_tab_font_style   normal

# Marks
mark1_foreground #100F0F
mark1_background #4385BE
mark2_foreground #100F0F
mark2_background #8B7EC8
mark3_foreground #100F0F
mark3_background #3AA99F

# ── Flexoki dark ANSI palette ──
# normal = 600-series (muted), bright = 400-series
# black
color0  #100F0F
color8  #575653
# red
color1  #AF3029
color9  #D14D41
# green
color2  #66800B
color10 #879A39
# yellow
color3  #AD8301
color11 #D0A215
# blue
color4  #205EA6
color12 #4385BE
# magenta
color5  #A02F6F
color13 #CE5D97
# cyan
color6  #24837B
color14 #3AA99F
# white
color7  #CECDC3
color15 #E6E4D9

# ── Shortcuts (preserved from your previous config) ──
map alt+enter    new_window_with_cwd
map alt+t        new_tab_with_cwd
map alt+n        new_os_window_with_cwd
map alt+k        previous_window
map alt+j        next_window
map alt+shift+j  previous_tab
map alt+shift+k  next_tab

enabled_layouts tall,stack
